<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0F1C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הוצאות">
<title>מעקב הוצאות</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0F1C;--s1:#131929;--s2:#1C2538;--s3:#242E45;--s4:#2D3A55;
  --brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.13);
  --acc:#00D4A8;--blue:#4F8EF7;--red:#F25C5C;--amber:#F5A623;
  --purple:#9B7FEA;--pink:#E879A0;--orange:#FF6B35;--indigo:#818CF8;
  --text:#EDF0F7;--muted:#6B7A99;--muted2:#9AA5C0;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:500px;margin:0 auto;position:relative;background:var(--bg)}

/* TOPBAR */
.topbar{background:var(--s1);border-bottom:.5px solid var(--brd);padding:14px 16px 12px;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.balance-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.balance-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.month-nav{display:flex;align-items:center;gap:8px}
.mnbtn{background:var(--s2);border:.5px solid var(--brd2);color:var(--muted2);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:15px;line-height:1;touch-action:manipulation}
.month-lbl{font-size:13px;font-weight:600;min-width:95px;text-align:center}
.pills{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pill{background:var(--s2);border-radius:8px;padding:7px 8px;border:.5px solid var(--brd)}
.pill .pl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.pill .pv{font-size:13px;font-weight:600}
.pv.g{color:var(--acc)}.pv.r{color:var(--red)}.pv.b{color:var(--blue)}.pv.p{color:var(--indigo)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:72px}
.content::-webkit-scrollbar{display:none}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--s1);border-top:.5px solid var(--brd);display:flex;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 4px;background:transparent;border:none;cursor:pointer;color:var(--muted);gap:2px;font-size:9px;touch-action:manipulation;transition:color .15s}
.navbtn.active{color:var(--acc)}
.navbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* SCREEN */
.screen{display:none;padding:14px 16px}.screen.active{display:block}

/* CARDS */
.card{background:var(--s1);border:.5px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.cat-cell{background:var(--s1);border:.5px solid var(--brd);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:border-color .15s}
.cat-cell:active{opacity:.7}
.cat-icon{font-size:22px;margin-bottom:4px}
.cat-name{font-size:10px;color:var(--muted2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-amt{font-size:12px;font-weight:600}
.cat-pct{font-size:10px;color:var(--muted)}

/* DONUT */
.donut-wrap{position:relative;display:flex;justify-content:center;align-items:center;height:160px;margin-bottom:10px}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center .dv{font-size:18px;font-weight:700}
.donut-center .dl{font-size:10px;color:var(--muted)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.leg-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* BAR CHART */
.bar-wrap{height:140px;position:relative;margin-bottom:4px}

/* TREND LIST */
.trend-item{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.trend-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.trend-info{flex:1}
.trend-name{font-size:12px;font-weight:500}
.trend-sub{font-size:10px;color:var(--muted)}
.trend-bar-wrap{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:4px;overflow:hidden}
.trend-bar{height:100%;border-radius:2px}
.trend-amt{font-size:13px;font-weight:600;min-width:60px;text-align:left;color:var(--red)}

/* TX */
.tx-filters{display:flex;gap:8px;margin-bottom:10px}
.tx-filters input{flex:1;background:var(--s2);border:.5px solid var(--brd);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;direction:rtl}
.tx-filters select{background:var(--s2);border:.5px solid var(--brd);color:var(--muted2);border-radius:8px;padding:8px 8px;font-size:12px;outline:none;direction:rtl;max-width:110px}
.day-group{margin-bottom:12px}
.day-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.tx-item{background:var(--s2);border-radius:10px;border:.5px solid var(--brd);margin-bottom:5px;overflow:hidden}
.tx-item.refund{background:rgba(0,212,168,.05);border-color:rgba(0,212,168,.25)}
.tx-row{display:flex;align-items:center;gap:10px;padding:10px 12px}
.tx-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.cat-select{background:var(--s3);border:.5px solid var(--brd2);color:var(--acc);border-radius:5px;padding:2px 5px;font-size:11px;outline:none;direction:rtl;cursor:pointer;max-width:110px}
.btn-xs{border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;border:.5px solid;white-space:nowrap;touch-action:manipulation}
.btn-remember{background:rgba(0,212,168,.1);border-color:rgba(0,212,168,.3);color:var(--acc)}
.btn-refund{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.3);color:var(--indigo)}
.btn-refund.active{background:rgba(129,140,248,.25)}
.tx-amt{font-size:14px;font-weight:600;flex-shrink:0}
.tx-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;touch-action:manipulation}
.tag-refund{font-size:9px;background:rgba(129,140,248,.2);color:var(--indigo);border-radius:4px;padding:1px 5px}
.tag-src{font-size:9px;background:var(--s3);color:var(--muted);border-radius:4px;padding:1px 5px}
.empty{text-align:center;color:var(--muted);padding:32px 0;font-size:13px}

/* PACE */
.pace-arc-wrap{display:flex;justify-content:center;position:relative;height:140px;margin-bottom:12px}
.pace-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-32%);text-align:center}
.pace-pct{font-size:28px;font-weight:700}
.pace-lbl{font-size:10px;color:var(--muted)}
.pace-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pace-stat{background:var(--s2);border:.5px solid var(--brd);border-radius:10px;padding:10px 12px;text-align:center}
.pace-stat .psl{font-size:10px;color:var(--muted);margin-bottom:3px}
.pace-stat .psv{font-size:16px;font-weight:600}
.dp-item{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.dp-day{font-size:11px;color:var(--muted);min-width:30px}
.dp-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.dp-bar{height:100%;border-radius:3px}
.dp-amt{font-size:12px;font-weight:500;min-width:58px;text-align:left}

/* IMPORT */
.drop-zone{border:1.5px dashed rgba(0,212,168,.3);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:rgba(0,212,168,.02);margin-bottom:12px;transition:all .2s}
.drop-zone:active{background:rgba(0,212,168,.06)}
.drop-icon{font-size:30px;margin-bottom:8px}
.drop-title{font-size:14px;font-weight:500;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.bank-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500}
.src-item{display:flex;align-items:center;gap:8px;background:var(--s2);border:.5px solid var(--brd);border-radius:9px;padding:9px 12px;margin-bottom:6px}
.src-name{flex:1;color:var(--muted2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.src-count{color:var(--muted);font-size:11px;flex-shrink:0}
.btn-del-src{background:rgba(242,92,92,.1);border:.5px solid rgba(242,92,92,.3);color:var(--red);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.man-form{background:var(--s2);border:.5px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px}
.man-form-title{font-size:12px;font-weight:500;color:var(--muted2);margin-bottom:10px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.fl label{font-size:10px;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fl input,.fl select{width:100%;background:var(--s3);border:.5px solid var(--brd);color:var(--text);border-radius:7px;padding:7px 9px;font-size:12px;outline:none;direction:rtl}
.fl input:focus,.fl select:focus{border-color:var(--acc)}
.fl select option{background:var(--s2)}
.btn-primary{background:var(--acc);color:#000;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-secondary{background:transparent;border:.5px solid var(--brd2);color:var(--muted2);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;touch-action:manipulation}
.export-btn{width:100%;background:transparent;border:.5px solid var(--brd2);color:var(--muted2);border-radius:9px;padding:11px;font-size:13px;cursor:pointer;touch-action:manipulation;margin-top:4px}
.sync-badge{font-size:11px;color:var(--muted);text-align:center;padding:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--acc)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s3);color:var(--text);border:.5px solid var(--brd2);border-radius:20px;padding:8px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app" id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-row1">
      <div>
        <div class="balance-lbl">סה"כ הוצאות</div>
        <div class="balance-val" id="topTotal">₪0</div>
      </div>
      <div class="month-nav">
        <button class="mnbtn" onclick="changeMonth(-1)">‹</button>
        <span class="month-lbl" id="monthLbl"></span>
        <button class="mnbtn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="pills">
      <div class="pill"><div class="pl">הכנסות</div><div class="pv g" id="topInc">₪0</div></div>
      <div class="pill"><div class="pl">הוצאות</div><div class="pv r" id="topExp">₪0</div></div>
      <div class="pill"><div class="pl">יתרה</div><div class="pv b" id="topBal">₪0</div></div>
      <div class="pill"><div class="pl">↩ החזרים</div><div class="pv p" id="topRef">₪0</div></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- CATEGORIES -->
    <div class="screen active" id="screen-cat">
      <div class="card">
        <div class="card-title">חלוקה לפי קטגוריה</div>
        <div class="legend" id="legend"></div>
        <div class="donut-wrap">
          <svg id="donutSvg" width="160" height="160" viewBox="0 0 160 160"></svg>
          <div class="donut-center"><div class="dv" id="donutVal">₪0</div><div class="dl">החודש</div></div>
        </div>
      </div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- OVERVIEW -->
    <div class="screen" id="screen-ov">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px" id="ovStats"></div>
      <div class="card">
        <div class="card-title">6 חודשים אחרונים</div>
        <div class="bar-wrap"><svg id="barSvg" width="100%" height="140" viewBox="0 0 320 140" preserveAspectRatio="none"></svg></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:6px">
          <div class="leg"><div class="leg-sq" style="background:#00D4A8"></div>הכנסות</div>
          <div class="leg"><div class="leg-sq" style="background:#F25C5C"></div>הוצאות</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">לפי קטגוריה</div>
        <div id="trendList"></div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="screen" id="screen-tx">
      <div class="tx-filters">
        <input type="text" id="txSearch" placeholder="חיפוש..." oninput="renderTx()">
        <select id="txCatF" onchange="renderTx()"><option value="">הכל</option></select>
      </div>
      <div id="txContainer"></div>
    </div>

    <!-- PACE -->
    <div class="screen" id="screen-pace">
      <div class="card">
        <div class="card-title" id="paceLbl"></div>
        <div class="pace-arc-wrap">
          <svg id="paceArc" width="160" height="140" viewBox="0 0 160 140"></svg>
          <div class="pace-center"><div class="pace-pct" id="pacePct">0%</div><div class="pace-lbl">מחודש קודם</div></div>
        </div>
        <div class="pace-stats" id="paceStats"></div>
      </div>
      <div class="card">
        <div class="card-title">הוצאות יומיות</div>
        <div id="dayPace"></div>
      </div>
    </div>

    <!-- IMPORT -->
    <div class="screen" id="screen-imp">
      <div class="drop-zone" onclick="document.getElementById('fileIn').click()">
        <input type="file" id="fileIn" accept=".csv,.xlsx,.xls" multiple style="display:none" onchange="handleFile(event)">
        <div class="drop-icon">📂</div>
        <div class="drop-title">העלה Excel / CSV מהכרטיס</div>
        <div class="drop-sub">.xlsx · .xls · .csv – זיהוי פורמט מקס אוטומטי</div>
        <div class="bank-chips">
          <span class="chip" style="background:rgba(79,142,247,.15);color:#7EB3FF">מקס</span>
          <span class="chip" style="background:rgba(155,127,234,.15);color:#C4ADFF">ישראכרט</span>
          <span class="chip" style="background:rgba(245,166,35,.15);color:#FFC94D">כאל</span>
          <span class="chip" style="background:rgba(0,212,168,.15);color:#00D4A8">לאומי</span>
        </div>
      </div>

      <div id="srcList"></div>

      <div class="man-form">
        <div class="man-form-title">➕ הוספה ידנית</div>
        <div class="fg2">
          <div class="fl"><label>תיאור</label><input id="mDesc" placeholder="שכר דירה..."></div>
          <div class="fl"><label>סכום ₪</label><input type="number" id="mAmt" placeholder="0" min="0"></div>
        </div>
        <div class="fg3">
          <div class="fl"><label>קטגוריה</label><select id="mCat" style="direction:rtl"></select></div>
          <div class="fl"><label>תאריך</label><input type="date" id="mDate"></div>
          <div class="fl"><label>סוג</label>
            <select id="mType">
              <option value="expense">הוצאה</option>
              <option value="income">הכנסה</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-primary" onclick="saveManual()">שמור</button>
          <button class="btn-secondary" onclick="clearManual()">נקה</button>
        </div>
      </div>

      <button class="export-btn" onclick="exportCSV()">ייצוא CSV לחודש זה ↓</button>
      <div class="sync-badge"><div class="sync-dot" id="syncDot"></div><span id="syncLbl">מחובר</span></div>
    </div>

  </div><!-- /content -->

  <!-- NAV -->
  <nav class="nav">
    <button class="navbtn active" onclick="switchTab('cat',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l5 3"/></svg>קטגוריות
    </button>
    <button class="navbtn" onclick="switchTab('ov',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>סקירה
    </button>
    <button class="navbtn" onclick="switchTab('tx',this)">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>עסקאות
    </button>
    <button class="navbtn" onclick="switchTab('pace',this)">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/><path d="M12 6v6l4 2"/></svg>קצב
    </button>
    <button class="navbtn" onclick="switchTab('imp',this)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>נתונים
    </button>
  </nav>
</div>

<div class="loader" id="loader">טוען נתונים...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Init ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDk6Oh5m55A112-r3zdWLcpcO6hF6bU_as",
  authDomain: "expense-tracker-de7f2.firebaseapp.com",
  projectId: "expense-tracker-de7f2",
  storageBucket: "expense-tracker-de7f2.firebasestorage.app",
  messagingSenderId: "153128680389",
  appId: "1:153128680389:web:c4c0d136bc89bf3b4d29ac"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const TXS = db.collection('transactions');
const SRCS = db.collection('sources');
const RULES = db.collection('rules');

// ── Config ─────────────────────────────────────────────────────────────────
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const CAT = {
  'שכירות':         {color:'#4F8EF7', icon:'🏠'},
  'מזון וסופר':     {color:'#00D4A8', icon:'🛒'},
  'רכב':            {color:'#F5A623', icon:'🚗'},
  'דלק':            {color:'#FF6B35', icon:'⛽'},

function parseDate(s) {
  if (!s) return new Date().toISOString().split('T')[0];
  const clean = String(s).trim();
  const m = clean.match(/^(\d{1,2})[\/\.-](\d{1,2})[\/\.-](\d{2,4})$/);
  if (m) { let y=parseInt(m[3]); if(y<100)y+=2000; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
  const d = new Date(clean); return isNaN(d) ? new Date().toISOString().split('T')[0] : d.toISOString().split('T')[0];
}

function getMonthData(m, y) {
  return txs.filter(t => { const d=new Date(t.date); return d.getMonth()===m && d.getFullYear()===y; });

function getExp(arr) { return arr.filter(t=>t.type!=='income'); }

// ── SVG Donut ──────────────────────────────────────────────────────────────
function donut(data, size=160) {
  const total = data.reduce((s,d)=>s+d.v,0)||1;
  let offset = -Math.PI/2;
  const cx=size/2, cy=size/2, r=size*.38, ir=size*.26;
  const paths = data.map(d=>{
    const angle=(d.v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(offset), y1=cy+r*Math.sin(offset);
    offset+=angle;
    const x2=cx+r*Math.cos(offset), y2=cy+r*Math.sin(offset);
    const ix1=cx+ir*Math.cos(offset-angle), iy1=cy+ir*Math.sin(offset-angle);
    const ix2=cx+ir*Math.cos(offset), iy2=cy+ir*Math.sin(offset);
    const lg=angle>Math.PI?1:0;
    return `<path d="M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg},0 ${ix1},${iy1} Z" fill="${d.color}" stroke="#131929" stroke-width="2"/>`;
  });
  return paths.join('');
}

  bL.forEach((m,i)=>{
    const x=i*gap+gap/2;

    bars+=`<rect x="${x-bw-2}" y="${H-iH}" width="${bw}" height="${iH}" rx="3" fill="${isLast?'#00D4A8':'rgba(0,212,168,.35)'}"/>`;
    bars+=`<rect x="${x+2}" y="${H-eH}" width="${bw}" height="${eH}" rx="3" fill="${isLast?'#F25C5C':'rgba(242,92,92,.4)'}"/>`;
    bars+=`<text x="${x}" y="${H+14}" text-anchor="middle" fill="#6B7A99" font-size="9">${m}</text>`;

// ── Pace Screen ────────────────────────────────────────────────────────────
function renderPace() {
  document.getElementById('paceLbl').textContent = 'קצב הוצאות – '+MONTHS[curM];
  const cur = getExp(getCur());
  const total = sum(cur);
  const today = new Date();
  const daysInM = new Date(curY,curM+1,0).getDate();
  const daysPassed = (curM===today.getMonth()&&curY===today.getFullYear()) ? today.getDate() : daysInM;
  const dailyAvg = daysPassed ? total/daysPassed : 0;
  const projected = dailyAvg*daysInM;
  let pm=curM-1,py=curY; if(pm<0){pm=11;py--;}
  const lastTotal = sum(getExp(getMonthData(pm,py)));
  const pct = lastTotal ? Math.round(total/lastTotal*100) : 0;
  document.getElementById('pacePct').textContent = pct+'%';
  document.getElementById('pacePct').style.color = pct>100?'var(--red)':'var(--acc)';

  // arc SVG
  const clamp=Math.min(pct,100);
  const angle=(clamp/100)*270-135;
  const rad=a=>a*Math.PI/180;
  const r=55,cx=80,cy=80;
  const sx=cx+r*Math.cos(rad(-135)), sy=cy+r*Math.sin(rad(-135));
  const ex=cx+r*Math.cos(rad(135)),  ey=cy+r*Math.sin(rad(135));
  const x2=cx+r*Math.cos(rad(angle)), y2=cy+r*Math.sin(rad(angle));
  const lg=clamp>50?1:0;
  const color=pct>100?'#F25C5C':'#00D4A8';
  document.getElementById('paceArc').innerHTML =
    `<path d="M${sx},${sy} A${r},${r} 0 1,1 ${ex},${ey}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="round"/>` +
    (clamp>0?`<path d="M${sx},${sy} A${r},${r} 0 ${lg},1 ${x2},${y2}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"/>`:'');

  document.getElementById('paceStats').innerHTML = [
    ['ממוצע יומי', fmt(dailyAvg), 'var(--amber)'],
    ['תחזית חודש', fmt(projected), 'var(--purple)'],
    ['חודש קודם', fmt(lastTotal), 'var(--muted2)'],
    [`${daysPassed}/${daysInM} ימים`, '', 'var(--blue)'],
  ].map(([l,v,c])=>`<div class="pace-stat"><div class="psl">${l}</div>${v?`<div class="psv" style="color:${c}">${v}</div>`:''}</div>`).join('');

  const byDay={};
  cur.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.amount;});
  const days=Object.keys(byDay).sort((a,b)=>new Date(b)-new Date(a)).slice(0,12);
  const maxD=Math.max(...Object.values(byDay),1);
  document.getElementById('dayPace').innerHTML = days.length ? days.map(dk=>{
    const v=byDay[dk], pctW=Math.round(v/maxD*100), hi=v>dailyAvg*1.5, d=new Date(dk);
    return `<div class="dp-item">
      <span class="dp-day">${d.getDate()}/${d.getMonth()+1}</span>
      <div class="dp-bar-wrap"><div class="dp-bar" style="width:${pctW}%;background:${hi?'#F25C5C':'#4F8EF7'}"></div></div>
      <span class="dp-amt" style="color:${hi?'var(--red)':'var(--text)'}">${fmt(v)}</span>
    </div>`;
  }).join('') : '<div class="empty">אין נתונים</div>';
}

// ── CRUD – Firestore ───────────────────────────────────────────────────────
async function deleteTx(id) {
  await TXS.doc(id).delete();
  txs = txs.filter(t=>t.id!==id);
  renderActive();
  toast('עסקה נמחקה');
}

async function toggleRefund(id) {
  const t = txs.find(t=>t.id===id);
  if(!t) return;
  const newVal = !t.refund;
  await TXS.doc(id).update({refund: newVal});
  t.refund = newVal;
  renderTx(); updateTopbar();
}

async function updateCat(id, newCat, applyAll) {
  const tx = txs.find(t=>t.id===id);
  if(!tx) return;
  const key = tx.desc.trim().toLowerCase().slice(0,30);
  if(applyAll) {
    // update all txs with same desc
    const batch = db.batch();
    const matching = txs.filter(t=>t.desc.trim().toLowerCase().slice(0,30)===key);
    matching.forEach(t=>{ batch.update(TXS.doc(t.id),{cat:newCat}); t.cat=newCat; });
    await batch.commit();
    // save rule
    await RULES.doc(key).set({cat:newCat});
    rules[key] = newCat;
    toast(`✓ עודכנו ${matching.length} עסקאות + נשמר לעתיד`);
  } else {
    await TXS.doc(id).update({cat:newCat});
    tx.cat = newCat;
    toast('קטגוריה עודכנה');
  }
  renderTx(); renderCat(); renderOv();
}

async function deleteSrc(fileId, name, count) {
  if(!confirm(`למחוק ${count} עסקאות מ-${name}?`)) return;
  setSyncState('syncing');
  const batch = db.batch();
  const snap = await TXS.where('fileId','==',fileId).get();
  snap.docs.forEach(d=>batch.delete(d.ref));
  const srcSnap = await SRCS.where('fileId','==',fileId).get();
  srcSnap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
  txs = txs.filter(t=>t.fileId!==fileId);
  srcs = srcs.filter(s=>s.fileId!==fileId);
  setSyncState('ok');
  renderActive();
  toast(`נמחקו ${snap.docs.length} עסקאות`);
}

async function saveManual() {
  const desc = document.getElementById('mDesc').value.trim();
  const amount = parseFloat(document.getElementById('mAmt').value);
  if(!desc||!amount) return;
  const t = {
    desc, amount,
    date: document.getElementById('mDate').value || new Date().toISOString().split('T')[0],
    type: document.getElementById('mType').value,
    cat:  document.getElementById('mCat').value,
    source:'ידני', fileId:'manual', refund:false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  setSyncState('syncing');
  const ref = await TXS.add(t);
  txs.push({...t, id:ref.id});
  setSyncState('ok');
  clearManual();
  renderActive();
  toast('✓ נשמר');
}

function clearManual() {
  document.getElementById('mDesc').value='';
  document.getElementById('mAmt').value='';
  document.getElementById('mDate').value=new Date().toISOString().split('T')[0];
  populateCatSelect('mCat');
}

  return 'אחר';
}

function parseMaxSheet(data, sourceLabel, fileId) {
  const res=[];
  for(let i=4;i<data.length;i++){
    const row=data[i];
    const dateRaw=row[0], name=String(row[1]||'').trim(), maxCat=String(row[2]||'').trim(), amtRaw=row[5];
    if(!name||amtRaw===''||amtRaw===null||amtRaw===undefined) continue;
    const amount=Math.abs(parseFloat(String(amtRaw).replace(/[,₪\s]/g,''))||0);
    if(!amount) continue;
    let dateStr='';
    if(dateRaw instanceof Date) dateStr=dateRaw.toISOString().split('T')[0];
    else dateStr=parseDate(String(dateRaw||''));
    const key=name.toLowerCase().slice(0,30);
    const cat=rules[key]||(SUB_RE.test(name)?'מינויים':MAX_CAT_MAP[maxCat]||'אחר');
    res.push({desc:name,amount,date:dateStr,type:'expense',cat,source:sourceLabel,fileId,refund:false});
  }
  return res;
}

async function handleFile(ev) {
  const files=Array.from(ev.target.files);
  ev.target.value='';
  for(const file of files){
    setSyncState('syncing');
    const isExcel=/\.(xlsx|xls)$/i.test(file.name);
    const fileId=Date.now()+'_'+file.name;
    const buf=await file.arrayBuffer();
    let allNew=[];

    if(isExcel){
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      wb.SheetNames.forEach(sh=>{
        const ws=wb.Sheets[sh];
        const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const isMax=data[3]&&String(data[3][0]).includes('תאריך');
        if(isMax){
          const lbl=sh.includes('חו')?'מקס חו"ל':'מקס';
          allNew=allNew.concat(parseMaxSheet(data,lbl,fileId));
        }
      });
    } else {
      const text=new TextDecoder('utf-8').decode(buf);
      const lines=text.split('\n').filter(l=>l.trim());
      let hi=0;
      for(let i=0;i<Math.min(8,lines.length);i++){if(lines[i].split(',').length>2){hi=i;break;}}
      const headers=lines[hi].split(',').map(h=>h.replace(/"/g,'').trim());
      lines.slice(hi+1).forEach((line,i)=>{
        const cols=line.split(',').map(c=>c.replace(/"/g,'').trim());
        if(cols.every(c=>!c)) return;
        const desc=cols[0]||'עסקה';
        const amount=Math.abs(parseFloat(cols[1]||0)||0);
        if(!amount) return;
        allNew.push({desc,amount,date:parseDate(cols[2]),type:'expense',cat:guessCategory(desc),source:'CSV',fileId,refund:false});
      });
    }

    if(!allNew.length){toast('לא נמצאו עסקאות בקובץ');setSyncState('ok');continue;}

    // batch write to Firestore
    const CHUNK=400;
    for(let i=0;i<allNew.length;i+=CHUNK){
      const batch=db.batch();
      allNew.slice(i,i+CHUNK).forEach(t=>{
        const ref=TXS.doc();
        t.id=ref.id;
        t.createdAt=firebase.firestore.FieldValue.serverTimestamp();
        batch.set(ref,t);
      });
      await batch.commit();
    }
    txs=[...txs,...allNew];

    const srcDoc={name:file.name,fmt:'מקס',count:allNew.length,date:new Date().toISOString().split('T')[0],fileId};
    const sRef=await SRCS.add(srcDoc);
    srcs.push({...srcDoc,id:sRef.id});

    setSyncState('ok');
    renderActive();
    toast(`✅ יובאו ${allNew.length} עסקאות`);
  }
}

// ── Export ─────────────────────────────────────────────────────────────────
function exportCSV() {
  const cur=getCur();
  if(!cur.length){toast('אין נתונים לייצוא');return;}
  const rows=['\uFEFFתאריך,תיאור,קטגוריה,מקור,סכום,סוג',...cur.map(t=>`${t.date},"${t.desc}",${t.cat},${t.source||'ידני'},${t.amount},${t.type}`)];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download=`הוצאות_${MONTHS[curM]}_${curY}.csv`;a.click();
}

// ── Firestore Listeners ────────────────────────────────────────────────────
function startListeners() {
  unsubTxs = TXS.onSnapshot(snap=>{
    txs = snap.docs.map(d=>({...d.data(), id:d.id}));
    renderActive(); updateTopbar();
  }, err=>{ console.error(err); setSyncState('err'); });

  unsubSrcs = SRCS.onSnapshot(snap=>{
    srcs = snap.docs.map(d=>({...d.data(), id:d.id}));
    if(activeTab==='imp') renderSrcs();
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    // load rules
    const rSnap = await RULES.get();
    rSnap.docs.forEach(d=>{ rules[d.id]=d.data().cat; });
    startListeners();
    document.getElementById('loader').style.display='none';
    document.getElementById('app').style.display='flex';
    setSyncState('ok');
  } catch(e){
    document.getElementById('loader').textContent='שגיאה בחיבור ל-Firebase';
    console.error(e);
  }
}
init();
